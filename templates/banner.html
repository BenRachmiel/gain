<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Services</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #111; color: #ccc; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.75rem; max-width: 560px; width: 100%; padding: 2rem; }
    a {
      display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
      background: #161616; border: 1px solid #222; border-radius: 10px;
      padding: 1.25rem 0.75rem; text-decoration: none; color: #ccc;
      transition: background 0.15s, border-color 0.15s;
    }
    a:hover { background: #1c1c1c; border-color: #333; }
    .icon { font-size: 1.5rem; }
    .label { font-size: 0.82rem; color: #888; }
  </style>
</head>
<body>
  <div class="grid">
    {% for href, icon, label in links %}
    <a href="{{ href }}">
      <span class="icon">{{ icon }}</span>
      <span class="label">{{ label }}</span>
    </a>
    {% endfor %}
  </div>
</body>
</html>
