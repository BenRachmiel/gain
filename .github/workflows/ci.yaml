name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Cargo check
        working-directory: backend
        run: |
          rustup show active-toolchain || true
          cargo check

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build check
        run: cd frontend && npm ci && npm run build

  build-backend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      REPO_LC: ""
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase repo
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ env.REPO_LC }}/images/backend
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-frontend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      REPO_LC: ""
    steps:
      - uses: actions/checkout@v5

      - name: Set lowercase repo
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ env.REPO_LC }}/images/frontend
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  helm:
    needs: [build-backend, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      chart-version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: azure/setup-helm@v5

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Bump chart version
        id: version
        run: |
          cd chart/gain-downloader
          CURRENT=$(grep '^version:' Chart.yaml | awk '{print $2}')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/^version: .*/version: $NEXT/" Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"$NEXT\"/" Chart.yaml
          echo "CHART_VERSION=$NEXT" >> "$GITHUB_ENV"
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Commit and push chart changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chart/gain-downloader/Chart.yaml
          git diff --cached --quiet || git commit -m "chart: bump to $CHART_VERSION"
          git push

      - name: Package and push chart
        run: |
          helm package chart/gain-downloader
          REPO="${{ github.repository }}"
          helm push gain-downloader-*.tgz "oci://ghcr.io/${REPO,,}/charts"

  notify-rig:
    needs: [build-backend, build-frontend, helm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Extract short SHA
        id: meta
        run: echo "short=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.RIG_DISPATCH_TOKEN }}
          repository: BenRachmiel/rig
          event-type: subchart-update
          client-payload: '{"source":"gain","chartVersion":"${{ needs.helm.outputs.chart-version }}","frontendTag":"${{ steps.meta.outputs.short }}","backendTag":"${{ steps.meta.outputs.short }}"}'

  update-gitops:
    needs: [build-backend, build-frontend, helm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.TALOS_CLUSTER_DEPLOY_KEY }}

      - name: Update talos-cluster
        env:
          CHART_VERSION: ${{ needs.helm.outputs.chart-version }}
        run: |
          TAG="sha-${GITHUB_SHA::7}"
          git clone git@github.com:BenRachmiel/talos-cluster.git
          cd talos-cluster
          sed -i "s/tag: sha-[a-f0-9]*/tag: $TAG/g" apps/gain-downloader/values.yaml
          sed -i "s/chartVersion: .*/chartVersion: $CHART_VERSION/" apps/gain-downloader/config.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/gain-downloader/values.yaml apps/gain-downloader/config.yaml
          git diff --cached --quiet || git commit -m "gain-downloader: $CHART_VERSION / $TAG"
          git push
