update-manifest:
  stage: deploy
  image: alpine/git:latest
  variables:
    GITHUB_REPO: "https://x-access-token:${GITHUB_PAT}@github.com/BenRachmiel/talos-cluster.git"
    MANIFEST_PATH: "infrastructure/preamp-downloader/deployment.yaml"
    IMAGE_TAG: "${CI_COMMIT_SHA}"
  script:
    - git clone --depth 1 "${GITHUB_REPO}" /tmp/talos-cluster
    - cd /tmp/talos-cluster
    - "sed -i \"s|image: ${CI_REGISTRY_IMAGE}/backend:.*|image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG}|\" ${MANIFEST_PATH}"
    - "sed -i \"s|image: ${CI_REGISTRY_IMAGE}/frontend:.*|image: ${CI_REGISTRY_IMAGE}/frontend:${IMAGE_TAG}|\" ${MANIFEST_PATH}"
    - git config user.email "gitlab-ci@benrachmiel.org"
    - git config user.name "GitLab CI"
    - git add "${MANIFEST_PATH}"
    - 'git diff --cached --quiet && echo "No changes to commit" && exit 0'
    - 'git commit -m "chore(music-downloader): update images to ${CI_COMMIT_SHORT_SHA}"'
    - git push origin main
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
