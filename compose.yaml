services:
  backend:
    build: backend/
    environment:
      MUSIC_DIR: /music
      MAX_CONCURRENT: "4"
    volumes:
      - music:/music

  frontend:
    build: frontend/
    environment:
      API_UPSTREAM: backend:8080
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  music:
