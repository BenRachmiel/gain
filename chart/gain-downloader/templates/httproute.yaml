{{- if and .Values.gateway.enabled .Values.oauthProxy.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "gain-downloader.fullname" . }}
  labels:
    {{- include "gain-downloader.labels" . | nindent 4 }}
spec:
  hostnames:
    - {{ .Values.gateway.host }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.gatewayName }}
      namespace: {{ .Values.gateway.gatewayNamespace }}
  rules:
    - backendRefs:
        - kind: Service
          name: {{ include "gain-downloader.fullname" . }}
          port: {{ .Values.service.port }}
      matches:
        - path:
            type: PathPrefix
            value: /
{{- end }}
