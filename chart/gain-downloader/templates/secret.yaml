{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gain-downloader.fullname" . }}
  labels:
    {{- include "gain-downloader.labels" . | nindent 4 }}
type: Opaque
stringData:
  SOURCE_API: {{ required "secrets.sourceAPI is required when not using existingSecret" .Values.secrets.sourceAPI | quote }}
  SOURCE_MIRRORS: {{ .Values.secrets.sourceMirrors | default .Values.secrets.sourceAPI | quote }}
  OAUTH2_PROXY_CLIENT_SECRET: {{ required "secrets.oauthClientSecret is required when not using existingSecret" .Values.secrets.oauthClientSecret | quote }}
  OAUTH2_PROXY_COOKIE_SECRET: {{ required "secrets.oauthCookieSecret is required when not using existingSecret" .Values.secrets.oauthCookieSecret | quote }}
{{- end }}
